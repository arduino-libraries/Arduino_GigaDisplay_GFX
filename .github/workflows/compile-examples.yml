name: Compile Examples

on:
  pull_request:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "library.properties"
      - "examples/**"
      - "src/**"
  push:
    paths:
      - ".github/workflows/compile-examples.yml"
      - "library.properties"
      - "examples/**"
      - "src/**"
  # Scheduled trigger checks for breakage caused by changes to external resources (libraries, platforms)
  schedule:
    # run every Saturday at 3 AM UTC
    - cron: "0 3 * * 6"
  # See: https://docs.github.com/en/free-pro-team@latest/actions/reference/events-that-trigger-workflows#workflow_dispatch
  workflow_dispatch:
  # See: https://docs.github.com/en/free-pro-team@latest/actions/reference/events-that-trigger-workflows#repository_dispatch
  repository_dispatch:

jobs:
  build:
    name: ${{ matrix.board.fqbn }}
    runs-on: ubuntu-latest

    env:
      UNIVERSAL_SKETCH_PATHS: |
        - examples/Basic
        - examples/Demo

      SKETCHES_REPORTS_PATH: sketches-reports

    strategy:
      fail-fast: false

      matrix:
        board:
          - fqbn: arduino:mbed_giga:giga
            platform-name: arduino:mbed_giga
            artifact-name-suffix: arduino-mbed_giga-giga
          - fqbn: arduino:zephyr_main:giga
            platform-name: arduino:zephyr_main
            artifact-name-suffix: arduino-zephyr_main-giga

        include:
          - board:
              platform-name: arduino:mbed_giga
            platforms: |
              # Install Arduino mbed_giga Boards via Boards Manager
              - name: arduino:mbed_giga
          - board:
              platform-name: arduino:zephyr_main
            platforms: |
              # Install Arduino Zephyr Boards via Boards Manager
              - name: arduino:zephyr_main
            # On the Zephyr core the video output is provided by the Arduino_Video library
            libraries: |
              - name: Arduino_Video

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile examples
        uses: arduino/compile-sketches@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          platforms: ${{ matrix.platforms }}
          fqbn: ${{ matrix.board.fqbn }}
          libraries: |
            # Install the library from the local path.
            - source-path: ./
            - name: Adafruit GFX Library
            ${{ matrix.libraries }}
          sketch-paths: |
            ${{ env.UNIVERSAL_SKETCH_PATHS }}
          enable-deltas-report: true
          sketches-report-path: ${{ env.SKETCHES_REPORTS_PATH }}

      - name: Save memory usage change report as artifact
        uses: actions/upload-artifact@v7
        with:
          name: sketches-report-${{ matrix.board.artifact-name-suffix }}
          if-no-files-found: error
          path: ${{ env.SKETCHES_REPORTS_PATH }}
